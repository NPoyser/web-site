<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Search Results</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f9f9f9;
        padding: 20px;
        padding-top: 50px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    .book-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        align-items: flex-start;
    }

    .book-card {
        width: 250px;
        padding: 15px;
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .book-card img {
        max-width: 150px;
        max-height: 220px;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .book-card h3 {
        margin: 5px 0;
        font-size: 16px;
    }

    .book-card p {
        font-size: 14px;
        margin: 3px 0;
        color: #555;
    }

    .book-card a {
        font-size: 14px;
        color: #1a0dab;
        text-decoration: none;
        margin: 2px 0;
    }

    .book-card a:hover {
        text-decoration: underline;
    }

    .more {
        display: none;
    }

    .read-more {
        cursor: pointer;
        color: #1a0dab;
        text-decoration: underline;
        font-weight: bold;
    }

    .results-info {
        text-align: center;
        margin-bottom: 20px;
        font-size: 14px;
        color: #333;
    }
#navbar {
	width: 100%;
	background: #1a1a2e;
	position: fixed;
	top: 0;
	left: 0;
	text-align: center;
	padding: 15px 0;
	box-shadow: 0 2px 5px rgba(0,0,0,0.2);
	z-index: 500;         /* behind arrow */
}

#navbar .nav-home {
	color: white;
	text-decoration: none;
	font-size: 18px;
	font-weight: bold;
	transition: color 0.3s;
    margin: 0 20px;  /* add horizontal space */
}

#navbar .nav-home:hover {
	color: #cfcff7;
}

#back-arrow {
	position: fixed;
	top: 50%;             /* vertical center of viewport */
	transform: translateY(-50%);
	left: 15px;
	font-size: 22px;
	color: white;
	background: #1a1a2e;
	width: 35px;             
	height: 35px;            
	display: flex;           /* use flexbox to center */
	justify-content: center; /* horizontal center */
	align-items: center;     /* vertical center */
	/*border-radius: 5px;      */
	border-radius: 50%;
	cursor: pointer;
	text-decoration: none;
	transition: background 0.3s, color 0.3s;
	z-index: 1000;
}

#back-arrow:hover {
	color: #00eeff;
	background: #000;
}

    </style>
</head>
<body>

    <a href="Projects.html" id="back-arrow">&#8592;</a>
<script>
$("#back-arrow").on("click", function(e){
    e.preventDefault();
    window.location.href = "Projects.html";  
});
</script>

    <nav id="navbar">
        <a href="Exercises.html" class="nav-home">Exercises</a>
        <a href="index.html" class="nav-home">Home</a>
        <a href="Labs.html" class="nav-home">Labs</a>
    </nav>

<h1>Search Results</h1>
<div class="results-info" id="results-info"></div>
<div class="book-list" id="books-container">
    <!-- Books will load here -->
</div>

<script>
$(document).ready(function() {
    $.getJSON('google-books-search.json', function(data) {
        const books = data.items || [];
        const totalResults = data.totalItems || books.length;

        // Show results count
        $('#results-info').text(`Showing ${books.length} of ${totalResults} results`);

        books.forEach(book => {
            const info = book.volumeInfo || {};
            const saleInfo = book.saleInfo || {};

            const title = info.title || "No title";
            const authors = info.authors ? info.authors.join(', ') : "Unknown author";
            const publishedDate = info.publishedDate || "Unknown date";
            const thumbnail = info.imageLinks ? info.imageLinks.thumbnail : "";
            const previewLink = info.previewLink || "#";
            const infoLink = info.infoLink || "#";
            const description = info.description || "";
            const shortDesc = description.substring(0, 150);
            const needsToggle = description.length > 150;
            const price = saleInfo.listPrice ? `$${saleInfo.listPrice.amount} ${saleInfo.listPrice.currencyCode}` : "Not for sale";

            const html = `
                <div class="book-card">
                    ${thumbnail ? `<img src="${thumbnail}" alt="${title} cover">` : ''}
                    <h3>${title}</h3>
                    <p><strong>Author(s):</strong> ${authors}</p>
                    <p><strong>Published:</strong> ${publishedDate}</p>
                    <p><strong>Price:</strong> ${price}</p>
                    <p class="description">
                        ${needsToggle ? `
                        <span class="short">${shortDesc}...</span>
                        <span class="full" style="display:none;">${description}</span>
                        <span class="read-more">Read more</span>
                       ` : description}
                    </p>
                    <p>
                        <a href="${previewLink}" target="_blank">Preview</a> | 
                        <a href="${infoLink}" target="_blank">More Info</a>
                    </p>
                </div>
            `;
            $('#books-container').append(html);
        });

        // Toggle full description
        $(document).on('click', '.read-more', function() {
    const card = $(this).closest('.description');
    const shortText = card.find('.short');
    const fullText = card.find('.full');

    if (fullText.is(':visible')) {
        fullText.hide();
        shortText.show();
        $(this).text('Read more');
    } else {
        fullText.show();
        shortText.hide();
        $(this).text('Show less');
    }
});
    });
});
</script>

</body>
</html>
