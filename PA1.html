<!DOCTYPE html>
<html>
<head>
  <title>Page 1 - User & Albums</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 30px;
}

h1 {
  color: #333;
}

.container {
  max-width: 700px;
  margin: 70px auto;
}

#user, #albums {
  background: white;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
}

a {
  text-decoration: none;
  color: blue;
}

a:hover {
  text-decoration: underline;
}
#navbar {
	width: 100%;
	background: #1a1a2e;
	position: fixed;
	top: 0;
	left: 0;
	text-align: center;
	padding: 15px 0;
	box-shadow: 0 2px 5px rgba(0,0,0,0.2);
	z-index: 500;         /* behind arrow */
}

#navbar .nav-home {
	color: white;
	text-decoration: none;
	font-size: 18px;
	font-weight: bold;
	transition: color 0.3s;
    margin: 0 20px;  /* add horizontal space */
}

#navbar .nav-home:hover {
	color: #cfcff7;
}

#back-arrow {
	position: fixed;
	top: 50%;             /* vertical center of viewport */
	transform: translateY(-50%);
	left: 15px;
	font-size: 22px;
	color: white;
	background: #1a1a2e;
	width: 35px;             
	height: 35px;            
	display: flex;           /* use flexbox to center */
	justify-content: center; /* horizontal center */
	align-items: center;     /* vertical center */
	/*border-radius: 5px;      */
	border-radius: 50%;
	cursor: pointer;
	text-decoration: none;
	transition: background 0.3s, color 0.3s;
	z-index: 1000;
}

#back-arrow:hover {
	color: #00eeff;
	background: #000;
}

</style>
</head>
<body>

<a href="Labs.html" id="back-arrow">&#8592;</a>
<script>
$("#back-arrow").on("click", function(e){
    e.preventDefault();
    window.location.href = "Labs.html";  
});
</script>

    <nav id="navbar">
        <a href="Exercises.html" class="nav-home">Exercises</a>
        <a href="index.html" class="nav-home">Home</a>
        <a href="Projects.html" class="nav-home">Projects</a>
    </nav>

<div class="container">

  <h1>User Info</h1>
  <div id="user"></div>

  <h1>Albums</h1>
  <div id="albums"></div>

</div>

<script>
// Fetch a user
fetch('https://jsonplaceholder.typicode.com/users/1')
.then(response => response.json())
.then(user => {
  document.getElementById("user").innerHTML = `
    <p><strong>Name:</strong> ${user.name}</p>
    <p><strong>Username:</strong> ${user.username}</p>
    <p><strong>Email:</strong> ${user.email}</p>
    <p><strong>City:</strong> ${user.address.city}</p>
    <p><strong>Company:</strong> ${user.company.name}</p>
    <p><strong>ID:</strong> ${user.id}</p>
  `;
});

// Fetchs albums for that user
fetch('https://jsonplaceholder.typicode.com/albums?userId=1')
.then(response => response.json())
.then(albums => {
  let output = "";

  albums.forEach(album => {
    output += `
      <p>
        <a href="PA2.html?albumId=${album.id}">
          ${album.title}
        </a>
      </p>
    `;
  });

  document.getElementById("albums").innerHTML = output;
});
</script>

</body>
</html>
