<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookshelf</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f9f9f9;
        margin: 0;
        padding: 20px;
    }

    #navbar {
        width: 100%;
        background: #1a1a2e;
        position: fixed;
        top: 0;
        left: 0;
        text-align: center;
        padding: 15px 0;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 500;
    }

    #navbar a {
        color: white;
        text-decoration: none;
        margin: 0 20px;
        font-weight: bold;
        transition: color 0.3s;
    }

    #navbar a:hover { color: #cfcff7; }

    #bookshelf {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 100px;
    }

    .book-card {
        background: #fff;
        width: 180px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        transition: transform 0.2s;
    }

    .book-card:hover { transform: translateY(-5px); }

    .book-card img {
        width: 120px;
        height: auto;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .book-card a {
        display: block;
        font-weight: bold;
        color: #333;
        text-decoration: none;
    }

    .book-card a:hover { color: #3498db; }

</style>
</head>
<body>

<nav id="navbar">
    <a href="Book Search.html">Home Search</a>
    <a href="Book Shelf.html">My Bookshelf</a>
</nav>

<h2 style="text-align:center; margin-top:120px;">My Bookshelf</h2>

<div id="bookshelf">
    <p>Loading bookshelf...</p>
</div>

<script>
// my API key
const apiKey = 'AIzaSyAWfUwfMBxAm7ifXYIGc3rBTV3iNcKnau4';

// List of Volume IDs from my public Google Books bookshelf
const volumeIds = [
    'XA0b0AEACAAJ',
    'kJw4xgJSEqMC',
    'nDrADwAAQBAJ',
    'QVn-CgAAQBAJ',
    'BYzwAQAAQBAJ'
];

const bookshelfDiv = document.getElementById('bookshelf');
bookshelfDiv.innerHTML = ''; // clear loading text

// Fetch each book by Volume ID
volumeIds.forEach(id => {
    fetch(`https://www.googleapis.com/books/v1/volumes/${id}?key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
        const info = data.volumeInfo;

        const title = info.title || 'No Title';
        const thumbnail = info.imageLinks ? info.imageLinks.thumbnail : '';
        const link = `Book Details.html?id=${id}`;

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            ${thumbnail ? `<img src="${thumbnail}" alt="${title} cover">` : ''}
            <a href="${link}">${title}</a>
        `;
        bookshelfDiv.appendChild(card);
    })
    .catch(err => {
        console.error(`Failed to load book ${id}`, err);
    });
});
</script>

</body>
</html>
