<!DOCTYPE html>
<html>
<head>
  <title>Movie App</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="stylish1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<style>
    body {
        margin: 0;
        padding: 30px;
        font-family: Arial, sans-serif;
    }
    #back-arrow {
	position: fixed;
	top: 50%;             /* vertical center of viewport */
	transform: translateY(-50%);
	left: 15px;
	font-size: 22px;
	color: white;
	background: #1a1a2e;
	width: 35px;             
	height: 35px;            
	display: flex;           /* use flexbox to center */
	justify-content: center; /* horizontal center */
	align-items: center;     /* vertical center */
	/*border-radius: 5px;      */
	border-radius: 50%;
	cursor: pointer;
	text-decoration: none;
	transition: background 0.3s, color 0.3s;
	z-index: 1000;
}

#back-arrow:hover {
	color: #00eeff;
	background: #000;
}

</style>
</head>
<body>


  <div class="navbar">
  <div class="nav-left">
    <button id="homeBtn">Home</button>

    <div class="dropdown">
      <button class="dropbtn">Movies</button>
      <div class="dropdown-content">
        <a href="#" data-category="popular">Popular</a>
        <a href="#" data-category="top_rated">Top Rated</a>
        <a href="#" data-category="now_playing">Now Playing</a>
        <a href="#" data-category="upcoming">Upcoming</a>
      </div>
    </div>
  </div>

  <div class="nav-right">
    <button id="searchBtn">Search</button>
  </div>
</div>

<div id="searchView" style="display:none;">
  <div class="search-container">
    <form id="searchForm">
      <input type="text" id="searchInput" placeholder="Search movies...">
      <button type="submit" id="searchSubmit">
        <i class="fa fa-search"></i>
      </button>
    </form>
  </div>
</div>

<div id="homeView"></div>

<div id="back-arrow">&#8592;</div>


<script src="scri1.js"></script>

</body>
</html>
