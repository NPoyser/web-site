<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Book Page</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            padding-top: 50px;
        }

        .book-card {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .book-card img {
            float: left;
            margin-right: 20px;
            max-width: 300px;
            border-radius: 5px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .book-info h2 {
            margin-top: 0;
            font-size: 28px;
            color: #222;
        }

        .book-info h3 {
            margin-top: -20px;
            font-weight: normal;
            color: #555;
        }

        .book-info p {
            margin: 5px 0;
            line-height: 1.5;
        }

        .book-info p strong {
            color: #111;
        }

        .book-info a {
            color: #1a0dab;
            text-decoration: none;
        }

        .book-info a:hover {
            text-decoration: underline;
        }

        .section-title {
            margin-top: 15px;
            margin-bottom: 5px; 
            font-size: 18px;
            font-weight: bold;           /* make the text bold */
            color: #404040;                 /* darker color for better contrast */
            border-bottom: 2px solid #b9b9b9;  /* darker, thicker line */
            /*border-bottom: 1px solid #eee;*/
            padding-bottom: 2px;
        }

        .clear {
            clear: both;
        }

        @media(max-width: 768px){
            .book-card img {
                float: none;
                display: block;
                margin: 0 auto 20px;
                max-width: 80%;
            }
        }


        #navbar {
	width: 100%;
	background: #1a1a2e;
	position: fixed;
	top: 0;
	left: 0;
	text-align: center;
	padding: 15px 0;
	box-shadow: 0 2px 5px rgba(0,0,0,0.2);
	z-index: 500;         /* behind arrow */
}

#navbar .nav-home {
	color: white;
	text-decoration: none;
	font-size: 18px;
	font-weight: bold;
	transition: color 0.3s;
    margin: 0 20px;  /* add horizontal space */
}

#navbar .nav-home:hover {
	color: #cfcff7;
}

#back-arrow {
	position: fixed;
	top: 50%;             /* vertical center of viewport */
	transform: translateY(-50%);
	left: 15px;
	font-size: 22px;
	color: white;
	background: #1a1a2e;
	width: 35px;             
	height: 35px;            
	display: flex;           /* use flexbox to center */
	justify-content: center; /* horizontal center */
	align-items: center;     /* vertical center */
	/*border-radius: 5px;      */
	border-radius: 50%;
	cursor: pointer;
	text-decoration: none;
	transition: background 0.3s, color 0.3s;
	z-index: 1000;
}

#back-arrow:hover {
	color: #00eeff;
	background: #000;
}

    </style>
</head>
<body>

    <a href="Projects.html" id="back-arrow">&#8592;</a>
<script>
$("#back-arrow").on("click", function(e){
    e.preventDefault();
    window.location.href = "Projects.html";  
});
</script>

    <nav id="navbar">
        <a href="Exercises.html" class="nav-home">Exercises</a>
        <a href="index.html" class="nav-home">Home</a>
        <a href="Labs.html" class="nav-home">Labs</a>
    </nav>

<div class="book-card" id="book-container">
    <p>Loading book details...</p>
</div>

<script>
$(document).ready(function() {
    $.getJSON('google-books-book.json', function(data) {
        const info = data.volumeInfo;

        const title = info.title || "No title available";
        const subtitle = info.subtitle || "";
        const authors = info.authors ? info.authors.join(', ') : "Unknown author";
        const publisher = info.publisher || "Unknown publisher";
        const publishedDate = info.publishedDate || "Unknown date";
        const description = info.description || "No description available";
        const pageCount = info.pageCount || "N/A";
        const categories = info.categories ? info.categories.join(', ') : "N/A";
        const language = info.language || "N/A";
        const previewLink = info.previewLink || "#";
        const infoLink = info.infoLink || "#";
        const thumbnail = info.imageLinks ? info.imageLinks.thumbnail : "";
        const industryIdentifiers = info.industryIdentifiers ? info.industryIdentifiers.map(id => `${id.type}: ${id.identifier}`).join(', ') : "N/A";
        const ratingsCount = info.ratingsCount || "N/A";
        const averageRating = info.averageRating || "N/A";
        const maturityRating = info.maturityRating || "N/A";

        const html = `
            ${thumbnail ? `<img src="${thumbnail}" alt="${title} cover">` : ''}
            <div class="book-info">
                <h2>${title}</h2>
                ${subtitle ? `<h3>${subtitle}</h3>` : ''}

                <p><strong>Author(s):</strong> ${authors}</p>
                <p><strong>Publisher:</strong> ${publisher}</p>
                <p><strong>Published Date:</strong> ${publishedDate}</p>
                <p><strong>Page Count:</strong> ${pageCount}</p>
                <p><strong>Categories:</strong> ${categories}</p>
                <p><strong>Language:</strong> ${language}</p>
                <p><strong>Maturity Rating:</strong> ${maturityRating}</p>
                <p><strong>Ratings:</strong> ${averageRating} (${ratingsCount} reviews)</p>
                <p><strong>Identifiers:</strong> ${industryIdentifiers}</p>

                <div class="section-title">Description</div>
                <p>${description}</p>

                <div class="section-title">Links</div>
                <p>
                    <a href="${previewLink}" target="_blank">Preview Book</a> | 
                    <a href="${infoLink}" target="_blank">More Info</a>
                </p>
            </div>
            <div class="clear"></div>
        `;

        $('#book-container').html(html);

    }).fail(function() {
        $('#book-container').html('<p style="color:red;">Failed to load book data. Make sure google-books-book.json is in the same folder.</p>');
    });
});
</script>

</body>
</html>
