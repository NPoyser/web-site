<!DOCTYPE html>
<html>
<head>
    <title>Weather Info</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6f0ff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#weatherContainer {
    border: 2px solid #1a1a2e;
    padding: 30px;
    width: 420px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    border-radius: 15px;
}

#weatherContainer h1 {
    text-align: center;
    margin-bottom: 20px;
}

#weatherInfo h2 {
    text-align: center;
    margin-bottom: 20px;
}

.weather-row {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    font-size: 16px;
}

/* Back arrow at top-left corner */
#back-arrow {
	position: fixed;
	top: 50%;             /* vertical center of viewport */
	transform: translateY(-50%);
	left: 15px;
	font-size: 22px;
	color: white;
	background: #1a1a2e;
	width: 35px;             
	height: 35px;            
	display: flex;           /* use flexbox to center */
	justify-content: center; /* horizontal center */
	align-items: center;     /* vertical center */
	/*border-radius: 5px;      */
	border-radius: 50%;
	cursor: pointer;
	text-decoration: none;
	transition: background 0.3s, color 0.3s;
	z-index: 1000;
}

#back-arrow:hover {
	color: #00eeff;
	background: #000;
}

/* Simple centered navbar */
#navbar {
	width: 100%;
	background: #1a1a2e;
	position: fixed;
	top: 0;
	left: 0;
	text-align: center;
	padding: 15px 0;
	box-shadow: 0 2px 5px rgba(0,0,0,0.2);
	z-index: 500;         /* behind arrow */
}

#navbar .nav-home {
	color: white;
	text-decoration: none;
	font-size: 18px;
	font-weight: bold;
	transition: color 0.3s;
}

#navbar .nav-home:hover {
	color: #cfcff7;
}
</style>

</head>

<body>

<a href="Labs.html" id="back-arrow">&#8592;</a>
<script>
$("#back-arrow").on("click", function(e){
    e.preventDefault();
    window.location.href = "Labs.html";  
});
</script>

<nav id="navbar">
    <a href="index.html" class="nav-home">Home</a>
</nav>

<div id="weatherContainer">
    <h1>Weather Information</h1>
    <div id="weatherInfo"></div>
</div>

<script>
    console.log("Script is running");
$(document).ready(function(){

    var weatherData = {
        "coord":{"lon":-0.13,"lat":51.51},
        "weather":[{"id":500,"main":"Rain","description":"light rain","icon":"10d"}],
        "base":"cmc stations",
        "main":{"temp":288.26,"pressure":1026,"humidity":59,"temp_min":286.95,"temp_max":289.26},
        "wind":{"speed":3.6,"deg":90},
        "clouds":{"all":75},
        "dt":1441734773,
        "sys":{"type":1,"id":5091,"message":0.0165,"country":"GB","sunrise":1441689887,"sunset":1441737016},
        "id":2643743,
        "name":"London",
        "cod":200
    };

let tempC = (weatherData.main.temp - 273.15).toFixed(1);
let tempF = ((weatherData.main.temp - 273.15) * 9/5 + 32).toFixed(1);

let condition = weatherData.weather[0].main;
let emoji = "";

if (condition === "Rain") {
    emoji = "🌧";
    document.body.style.background =
    "linear-gradient(135deg, #b3d8ff, #dff1ff)";
} else if (condition === "Clouds") {
    emoji = "☁️";
    document.body.style.background =
    "linear-gradient(135deg, #bdc3c7, #2c3e50)";
} else if (condition === "Clear") {
    emoji = "☀️";
    document.body.style.background =
    "linear-gradient(135deg, #fceabb, #f8b500)";
} else if (condition === "Snow") {
    emoji = "❄️";
} else {
    emoji = "🌤";
}

let iconCode = weatherData.weather[0].icon;
let iconUrl = "https://openweathermap.org/img/wn/" + iconCode + "@2x.png";

$("#weatherInfo").html(

    "<h2 style='text-align:center'>" +
    "<span style='font-size:28px; margin-right:8px; filter: drop-shadow(0 0 2px rgba(0,0,0,0.3));'>" +
    emoji +
    "</span>" +
    weatherData.name + ", " + weatherData.sys.country +
    "</h2>" +
    "<div style='text-align:center'><img src='" + iconUrl + "'></div>" +


    "<div class='weather-row'><span>Temperature</span><span>" + tempC + "°C / " + tempF + "°F</span></div>" +
    "<div class='weather-row'><span>Condition</span><span>" + weatherData.weather[0].description + "</span></div>" +
    "<div class='weather-row'><span>Humidity</span><span>" + weatherData.main.humidity + "%</span></div>" +
    "<div class='weather-row'><span>Wind Speed</span><span>" + weatherData.wind.speed + " m/s</span></div>" +
    "<div class='weather-row'><span>Cloud Coverage</span><span>" + weatherData.clouds.all + "%</span></div>" +
    "<div class='weather-row'><span>Pressure</span><span>" + weatherData.main.pressure + " hPa</span></div>"
);

});
</script>

</body>
</html>
